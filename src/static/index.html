<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Book Library</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --plastic: #e8e0d0;
      --plastic-dk: #c8bfaa;
      --plastic-sh: #a09888;
      --screen: #c8d8a0;
      --screen-dk: #88a060;
      --ink: #1a1a2e;
      --red: #d63031;
      --red-dk: #8b1a1a;
      --blue: #0984e3;
      --blue-dk: #034f8a;
      --yellow: #fdcb6e;
      --yellow-dk: #b8860b;
      --green: #00b894;
      --green-dk: #006d55;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--plastic);
      background-image: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(0, 0, 0, 0.015) 2px, rgba(0, 0, 0, 0.015) 4px);
      font-family: 'Press Start 2P', monospace;
      color: var(--ink);
      padding-bottom: 60px;
    }

    /* NAV */
    nav {
      background: var(--ink);
      border-bottom: 4px solid var(--red);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      color: var(--yellow);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .nav-brand span {
      display: inline-block;
      width: 22px;
      height: 22px;
      background: var(--red);
      border: 2px solid var(--yellow);
      box-shadow: 2px 2px 0 var(--red-dk);
      text-align: center;
      line-height: 18px;
      font-size: 0.6rem;
    }

    .btn-nav {
      background: var(--red);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--red-dk);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      padding: 8px 14px;
      cursor: pointer;
      transition: transform .08s, box-shadow .08s;
    }

    .btn-nav:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 var(--red-dk);
    }

    .btn-nav:active {
      transform: translate(4px, 4px);
      box-shadow: 0 0 0 var(--red-dk);
    }

    /* WRAP */
    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    /* MODAL ZONE — sits inline at top, hidden by default */
    .modal-zone {
      display: none;
      margin-bottom: 24px;
    }

    .modal-zone.open {
      display: block;
    }

    .modal-box {
      background: var(--plastic);
      border: 4px solid var(--ink);
      box-shadow: 6px 6px 0 var(--ink);
      max-width: 480px;
      margin: 0 auto;
    }

    .modal-head {
      background: var(--ink);
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-head h3 {
      font-size: 0.6rem;
      color: var(--yellow);
      letter-spacing: 1px;
    }

    .modal-close {
      background: var(--red);
      border: 2px solid var(--yellow);
      color: var(--yellow);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      width: 26px;
      height: 26px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--red-dk);
      transition: transform .06s, box-shadow .06s;
    }

    .modal-close:hover {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--red-dk);
    }

    .modal-close:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .modal-body {
      padding: 20px 18px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 0.46rem;
      color: var(--ink);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      background: var(--screen);
      border: 3px solid var(--ink);
      box-shadow: inset 2px 2px 0 var(--screen-dk);
      padding: 8px 10px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      color: var(--ink);
      outline: none;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      background: #d8ebb8;
      box-shadow: inset 2px 2px 0 var(--screen-dk), 0 0 0 2px var(--yellow);
    }

    .field textarea {
      resize: vertical;
      min-height: 70px;
    }

    .modal-foot {
      padding: 14px 18px;
      border-top: 3px solid var(--ink);
      background: var(--plastic-dk);
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .btn-save {
      background: var(--green);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--green-dk);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      padding: 9px 16px;
      cursor: pointer;
      transition: transform .06s, box-shadow .06s;
    }

    .btn-save:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 var(--green-dk);
    }

    .btn-save:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .btn-cancel {
      background: var(--plastic);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--plastic-sh);
      color: var(--ink);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      padding: 9px 16px;
      cursor: pointer;
      transition: transform .06s, box-shadow .06s;
    }

    .btn-cancel:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 var(--plastic-sh);
    }

    .btn-cancel:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    .btn-del-confirm {
      background: var(--red);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--red-dk);
      color: #fff;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.52rem;
      padding: 9px 16px;
      cursor: pointer;
      transition: transform .06s, box-shadow .06s;
    }

    .btn-del-confirm:hover {
      transform: translate(1px, 1px);
      box-shadow: 3px 3px 0 var(--red-dk);
    }

    .btn-del-confirm:active {
      transform: translate(4px, 4px);
      box-shadow: none;
    }

    /* HEADER */
    .header {
      background: var(--ink);
      border: 4px solid var(--ink);
      box-shadow: 4px 4px 0 var(--plastic-sh);
      padding: 20px 24px;
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 {
      color: var(--yellow);
      font-size: 0.95rem;
      letter-spacing: 2px;
      line-height: 1.7;
      margin-bottom: 6px;
    }

    .header p {
      color: var(--screen);
      font-size: 0.45rem;
      letter-spacing: 2px;
    }

    /* STATS */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat {
      background: var(--screen);
      border: 3px solid var(--ink);
      box-shadow: 4px 4px 0 var(--screen-dk);
      padding: 14px 10px;
      text-align: center;
    }

    .stat-num {
      font-size: 1.5rem;
      color: var(--ink);
      display: block;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-lbl {
      font-size: 0.4rem;
      color: var(--screen-dk);
      letter-spacing: 1px;
    }

    /* COLUMNS */
    .cols {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .col {
      border: 4px solid var(--ink);
      display: flex;
      flex-direction: column;
    }

    .col-pending {
      box-shadow: 4px 4px 0 var(--blue-dk);
    }

    .col-reading {
      box-shadow: 4px 4px 0 var(--red-dk);
    }

    .col-read {
      box-shadow: 4px 4px 0 var(--green-dk);
    }

    .col-head {
      padding: 12px 14px;
      border-bottom: 4px solid var(--ink);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .col-pending .col-head {
      background: var(--blue);
    }

    .col-reading .col-head {
      background: var(--red);
    }

    .col-read .col-head {
      background: var(--green);
    }

    .col-head h2 {
      font-size: 0.52rem;
      color: #fff;
      letter-spacing: 1px;
      flex: 1;
    }

    .badge {
      background: var(--ink);
      color: var(--yellow);
      font-size: 0.45rem;
      padding: 4px 8px;
      border: 2px solid var(--yellow);
      min-width: 28px;
      text-align: center;
    }

    .col-body {
      background: #f5f0e8;
      flex: 1;
      overflow-y: auto;
      max-height: 480px;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .col-body::-webkit-scrollbar {
      width: 8px;
    }

    .col-body::-webkit-scrollbar-track {
      background: var(--plastic-dk);
    }

    .col-body::-webkit-scrollbar-thumb {
      background: var(--ink);
    }

    /* BOOK CARD */
    .book {
      background: #fff;
      border: 3px solid var(--ink);
      padding: 12px;
      cursor: pointer;
      transition: transform .08s, box-shadow .08s;
    }

    .col-pending .book {
      box-shadow: 3px 3px 0 var(--blue-dk);
    }

    .col-reading .book {
      box-shadow: 3px 3px 0 var(--red-dk);
    }

    .col-read .book {
      box-shadow: 3px 3px 0 var(--green-dk);
    }

    .book:hover {
      transform: translate(-1px, -1px);
    }

    .col-pending .book:hover {
      box-shadow: 4px 4px 0 var(--blue-dk);
    }

    .col-reading .book:hover {
      box-shadow: 4px 4px 0 var(--red-dk);
    }

    .col-read .book:hover {
      box-shadow: 4px 4px 0 var(--green-dk);
    }

    .book-title {
      font-size: 0.58rem;
      line-height: 1.6;
      color: var(--ink);
      margin-bottom: 5px;
    }

    .book-author {
      font-size: 0.45rem;
      color: #666;
      margin-bottom: 8px;
      padding-bottom: 8px;
      border-bottom: 2px dashed var(--plastic-dk);
      font-style: italic;
    }

    .book-desc {
      font-size: 0.42rem;
      color: #888;
      line-height: 1.8;
      margin-bottom: 8px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .book-btns {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }

    .btn-xs {
      background: var(--plastic);
      border: 2px solid var(--ink);
      box-shadow: 2px 2px 0 var(--plastic-sh);
      padding: 4px 8px;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.4rem;
      cursor: pointer;
      color: var(--ink);
      transition: transform .06s, box-shadow .06s;
    }

    .btn-xs:hover {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--plastic-sh);
    }

    .btn-xs:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .btn-xs-del {
      background: #ffeaea;
      border-color: var(--red-dk);
      color: var(--red-dk);
      box-shadow: 2px 2px 0 var(--red-dk);
    }

    /* EMPTY */
    .empty {
      text-align: center;
      padding: 32px 12px;
      color: var(--plastic-sh);
      font-size: 0.45rem;
      line-height: 2.2;
    }

    /* TOAST */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 999;
      background: var(--ink);
      border: 3px solid var(--yellow);
      box-shadow: 4px 4px 0 var(--yellow-dk);
      color: var(--yellow);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.5rem;
      padding: 12px 16px;
      max-width: 260px;
      line-height: 1.8;
      animation: pop-in .15s ease;
    }

    .toast-err {
      border-color: var(--red);
      box-shadow: 4px 4px 0 var(--red-dk);
      color: #ffaaaa;
    }

    @keyframes pop-in {
      from {
        transform: scale(.85) translateY(8px);
        opacity: 0
      }

      to {
        transform: scale(1) translateY(0);
        opacity: 1
      }
    }

    @media(max-width:900px) {
      .cols {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>

  <nav>
    <a class="nav-brand" href="#"><span>B</span> MY BOOK LIBRARY</a>
    <button class="btn-nav" onclick="openAdd()">+ ADD BOOK</button>
  </nav>

  <div class="wrap">

    <!-- BOOK MODAL (inline) -->
    <div class="modal-zone" id="bookModal">
      <div class="modal-box">
        <div class="modal-head">
          <h3 id="modalTitle">ADD NEW BOOK</h3>
          <button class="modal-close" onclick="closeBookModal()">X</button>
        </div>
        <div class="modal-body">
          <div class="field"><label>TITLE *</label><input type="text" id="bookTitle" placeholder="Enter title..."></div>
          <div class="field"><label>AUTHOR *</label><input type="text" id="bookAuthor" placeholder="Enter author...">
          </div>
          <div class="field"><label>DESCRIPTION</label><textarea id="bookDescription"
              placeholder="What is it about?"></textarea></div>
          <div class="field"><label>STATUS *</label>
            <select id="bookStatus">
              <option value="pending">TO READ</option>
              <option value="reading">CURRENTLY READING</option>
              <option value="read">COMPLETED</option>
            </select>
          </div>
        </div>
        <div class="modal-foot">
          <button class="btn-cancel" onclick="closeBookModal()">CANCEL</button>
          <button class="btn-save" onclick="saveBook()">SAVE</button>
        </div>
      </div>
    </div>

    <!-- DELETE MODAL (inline) -->
    <div class="modal-zone" id="delModal">
      <div class="modal-box">
        <div class="modal-head">
          <h3>DELETE BOOK?</h3>
          <button class="modal-close" onclick="closeDelModal()">X</button>
        </div>
        <div class="modal-body">
          <p style="font-size:0.48rem;line-height:2.2;color:var(--ink);">REMOVE THIS BOOK?<br>THIS CANNOT BE UNDONE.</p>
        </div>
        <div class="modal-foot">
          <button class="btn-cancel" onclick="closeDelModal()">CANCEL</button>
          <button class="btn-del-confirm" onclick="confirmDelete()">DELETE</button>
        </div>
      </div>
    </div>

    <div class="header">
      <h1>* MY READING COLLECTION *</h1>
      <p>TRACK YOUR READING JOURNEY</p>
    </div>

    <div class="stats">
      <div class="stat"><span class="stat-num" id="s-total">0</span><span class="stat-lbl">TOTAL</span></div>
      <div class="stat"><span class="stat-num" id="s-reading">0</span><span class="stat-lbl">READING</span></div>
      <div class="stat"><span class="stat-num" id="s-done">0</span><span class="stat-lbl">DONE</span></div>
      <div class="stat"><span class="stat-num" id="s-queue">0</span><span class="stat-lbl">QUEUE</span></div>
    </div>

    <div class="cols">
      <div class="col col-pending">
        <div class="col-head">
          <h2>TO READ</h2><span class="badge" id="c-pending">0</span>
        </div>
        <div class="col-body" id="pending-books"></div>
      </div>
      <div class="col col-reading">
        <div class="col-head">
          <h2>READING</h2><span class="badge" id="c-reading">0</span>
        </div>
        <div class="col-body" id="reading-books"></div>
      </div>
      <div class="col col-read">
        <div class="col-head">
          <h2>COMPLETED</h2><span class="badge" id="c-read">0</span>
        </div>
        <div class="col-body" id="read-books"></div>
      </div>
    </div>

  </div>

  <script>
    const API = '/api/v1';
    let books = [], editId = null, delId = null;

    function scrollToModal(id) {
      document.getElementById(id).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function openAdd() {
      editId = null;
      document.getElementById('modalTitle').textContent = 'ADD NEW BOOK';
      document.getElementById('bookTitle').value = '';
      document.getElementById('bookAuthor').value = '';
      document.getElementById('bookDescription').value = '';
      document.getElementById('bookStatus').value = 'pending';
      document.getElementById('delModal').classList.remove('open');
      document.getElementById('bookModal').classList.add('open');
      scrollToModal('bookModal');
    }

    function openEdit(id) {
      const b = books.find(x => x.id === id); if (!b) return;
      editId = id;
      document.getElementById('modalTitle').textContent = 'EDIT BOOK';
      document.getElementById('bookTitle').value = b.title;
      document.getElementById('bookAuthor').value = b.author;
      document.getElementById('bookDescription').value = b.description || '';
      document.getElementById('bookStatus').value = b.status;
      document.getElementById('delModal').classList.remove('open');
      document.getElementById('bookModal').classList.add('open');
      scrollToModal('bookModal');
    }

    function closeBookModal() { document.getElementById('bookModal').classList.remove('open'); }
    function closeDelModal() { document.getElementById('delModal').classList.remove('open'); }

    async function load() {
      try {
        const r = await fetch(`${API}/books/`);
        if (!r.ok) throw new Error();
        books = await r.json();
        render(); stats();
      } catch { toast('ERROR LOADING BOOKS', true); }
    }

    function render() {
      fill('pending-books', books.filter(b => b.status === 'pending'));
      fill('reading-books', books.filter(b => b.status === 'reading'));
      fill('read-books', books.filter(b => b.status === 'read'));
      document.getElementById('c-pending').textContent = books.filter(b => b.status === 'pending').length;
      document.getElementById('c-reading').textContent = books.filter(b => b.status === 'reading').length;
      document.getElementById('c-read').textContent = books.filter(b => b.status === 'read').length;
    }

    function fill(id, list) {
      const el = document.getElementById(id);
      if (!list.length) { el.innerHTML = '<div class="empty">[ EMPTY ]<br>NO BOOKS YET</div>'; return; }
      el.innerHTML = list.map(b => `
      <div class="book" onclick="openEdit(${b.id})">
        <div class="book-title">${esc(b.title)}</div>
        <div class="book-author">> ${esc(b.author)}</div>
        ${b.description ? `<div class="book-desc">${esc(b.description)}</div>` : ''}
        <div class="book-btns" onclick="event.stopPropagation()">
          <button class="btn-xs" onclick="move(${b.id},'${next(b.status)}')">MOVE &gt;</button>
          <button class="btn-xs" onclick="openEdit(${b.id})">EDIT</button>
          <button class="btn-xs btn-xs-del" onclick="askDel(${b.id})">DEL</button>
        </div>
      </div>`).join('');
    }

    function stats() {
      document.getElementById('s-total').textContent = books.length;
      document.getElementById('s-reading').textContent = books.filter(b => b.status === 'reading').length;
      document.getElementById('s-done').textContent = books.filter(b => b.status === 'read').length;
      document.getElementById('s-queue').textContent = books.filter(b => b.status === 'pending').length;
    }

    function next(s) { return { pending: 'reading', reading: 'read', read: 'pending' }[s] || 'pending'; }

    async function saveBook() {
      const title = document.getElementById('bookTitle').value.trim();
      const author = document.getElementById('bookAuthor').value.trim();
      const desc = document.getElementById('bookDescription').value.trim();
      const status = document.getElementById('bookStatus').value;
      if (!title || !author) { toast('TITLE + AUTHOR REQUIRED', true); return; }
      const body = { title, author, description: desc || undefined, status };
      try {
        const r = editId
          ? await fetch(`${API}/books/${editId}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) })
          : await fetch(`${API}/books/`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        if (!r.ok) throw new Error();
        closeBookModal();
        toast(editId ? 'BOOK UPDATED!' : 'BOOK ADDED!');
        load();
      } catch { toast('ERROR SAVING', true); }
    }

    async function move(id, s) {
      try {
        await fetch(`${API}/books/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status: s }) });
        load(); toast('STATUS UPDATED!');
      } catch { toast('ERROR', true); }
    }

    function askDel(id) {
      delId = id;
      document.getElementById('bookModal').classList.remove('open');
      document.getElementById('delModal').classList.add('open');
      scrollToModal('delModal');
    }

    async function confirmDelete() {
      if (!delId) return;
      closeDelModal();
      try {
        await fetch(`${API}/books/${delId}`, { method: 'DELETE' });
        delId = null; load(); toast('BOOK DELETED!');
      } catch { toast('ERROR DELETING', true); }
    }

    function toast(msg, err) {
      const t = document.createElement('div');
      t.className = 'toast' + (err ? ' toast-err' : '');
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity .3s'; setTimeout(() => t.remove(), 350); }, 2600);
    }

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    load();
  </script>
</body>

</html>
